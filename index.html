    <!-- ================= 核心遊戲邏輯 JavaScript ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ================= Firebase 初始化 (依照系統規定規則 3) =================
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let currentUser = null;
        let isAuthReady = false;

        // 登入流程：優先執行匿名登入，完成後解鎖介面
        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (err) {
                console.error("雲端驗證失敗:", err);
                showToast("雲端連線失敗，請重新整理網頁");
            }
        };

        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                isAuthReady = true;
                // 解鎖介面，顯示按鈕
                peerInitStatus.classList.add('hidden');
                peerPanel.classList.remove('hidden');
            }
        });

        // ================= 遊戲常數與全域變數 =================
        const MODES = {
            PVE: 'pve',
            PVP_LOCAL: 'pvp_local',
            PVP_ONLINE: 'pvp_online'
        };

        let currentMode = MODES.PVE;
        let boardState = Array(25).fill(null); 
        let currentTurn = 'O'; 
        let gameActive = true;
        let soundEnabled = true;

        // 雲端連線變數
        let activeRoomId = '';
        let myOnlineRole = ''; // 'O' 為房主，'X' 為加入者
        let roomListenerUnsubscribe = null; // 雲端監聽器

        // 歷史比分
        let scores = { O: 0, X: 0, Draw: 0 };

        // ================= 音訊合成系統 =================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (!soundEnabled) return;
            try {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (type === 'click-o') {
                    osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15); 
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                } else if (type === 'click-x') {
                    osc.frequency.setValueAtTime(329.63, audioCtx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(220, audioCtx.currentTime + 0.15); 
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                } else if (type === 'win') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
                    osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.6);
                } else if (type === 'draw') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(293.66, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(220.00, audioCtx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.4);
                } else if (type === 'error') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.25);
                }
            } catch (e) {
                console.log('音效解鎖異常:', e);
            }
        }

        // ================= 5x5 (4子連線) 獲勝演算法 =================
        function checkWin(board, player) {
            const SIZE = 5;
            const WIN_LEN = 4;
            const matrix = [];
            for (let r = 0; r < SIZE; r++) {
                matrix.push(board.slice(r * SIZE, (r + 1) * SIZE));
            }
            const directions = [
                { dr: 0, dc: 1 },  // 橫向
                { dr: 1, dc: 0 },  // 縱向
                { dr: 1, dc: 1 },  // 斜對角
                { dr: 1, dc: -1 }  // 反斜對角
            ];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (matrix[r][c] !== player) continue;
                    for (const { dr, dc } of directions) {
                        let count = 0;
                        const winIndices = [];
                        for (let step = 0; step < WIN_LEN; step++) {
                            const nr = r + dr * step;
                            const nc = c + dc * step;
                            if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && matrix[nr][nc] === player) {
                                count++;
                                winIndices.push(nr * SIZE + nc);
                            } else {
                                break;
                            }
                        }
                        if (count === WIN_LEN) {
                            return winIndices; 
                        }
                    }
                }
            }
            return [];
        }

        function checkDraw(board) {
            return board.every(cell => cell !== null);
        }

        // ================= 智慧型啟發式 AI 演算法 =================
        function getBestMoveHeuristic(board, aiPlayer, humanPlayer) {
            const SIZE = 5;
            const WIN_LEN = 4;
            let bestScore = -Infinity;
            let bestMoves = [];

            function evaluateWindow(windowArr, currentCheckPlayer) {
                const opponent = currentCheckPlayer === 'X' ? 'O' : 'X';
                let countSelf = 0;
                let countOpponent = 0;
                let countEmpty = 0;

                windowArr.forEach(cell => {
                    if (cell === currentCheckPlayer) countSelf++;
                    else if (cell === opponent) countOpponent++;
                    else countEmpty++;
                });

                if (countSelf === 3 && countEmpty === 1) return 1000; 
                if (countOpponent === 3 && countEmpty === 1) return 500;  
                if (countSelf === 2 && countEmpty === 2) return 50;   
                if (countOpponent === 2 && countEmpty === 2) return 30;   
                if (countSelf === 1 && countEmpty === 3) return 5;    
                
                return 0;
            }

            function getCellHeuristicScore(cellIndex, candidatePlayer) {
                let totalScore = 0;
                const tempBoard = [...board];
                tempBoard[cellIndex] = candidatePlayer; 

                const matrix = [];
                for (let i = 0; i < SIZE; i++) {
                    matrix.push(tempBoard.slice(i * SIZE, (i + 1) * SIZE));
                }

                const directions = [
                    { dr: 0, dc: 1 },  
                    { dr: 1, dc: 0 },  
                    { dr: 1, dc: 1 },  
                    { dr: 1, dc: -1 }  
                ];

                for (let row = 0; row < SIZE; row++) {
                    for (let col = 0; col < SIZE; col++) {
                        for (const { dr, dc } of directions) {
                            const windowArr = [];
                            let isValid = true;

                            for (let step = 0; step < WIN_LEN; step++) {
                                const nr = row + dr * step;
                                const nc = col + dc * step;

                                if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                                    windowArr.push(matrix[nr][nc]);
                                } else {
                                    isValid = false;
                                    break;
                                }
                            }

                            if (isValid) {
                                totalScore += evaluateWindow(windowArr, aiPlayer);
                                totalScore += evaluateWindow(windowArr, humanPlayer) * 0.95; 
                            }
                        }
                    }
                }

                if (cellIndex === 12) totalScore += 15;
                else if ([6, 7, 8, 11, 13, 16, 17, 18].includes(cellIndex)) totalScore += 5;

                return totalScore;
            }

            for (let i = 0; i < board.length; i++) {
                if (board[i] === null) {
                    const score = getCellHeuristicScore(i, aiPlayer);
                    if (score > bestScore) {
                        bestScore = score;
                        bestMoves = [i];
                    } else if (score === bestScore) {
                        bestMoves.push(i);
                    }
                }
            }

            if (bestMoves.length > 0) {
                return bestMoves[Math.floor(Math.random() * bestMoves.length)];
            }
            return -1;
        }

            }
            return result; 
        }

            const { doc, onSnapshot } = window.dbUtils;
            const roomDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);

            // 遵守規則：必須處理錯誤 Callback
            roomListenerUnsubscribe = onSnapshot(roomDocRef, (docSnap) => {
                if (!docSnap.exists()) {
                    // 房間已被房主取消或關閉
                    showToast("對手已離開房間或對局已結束。");
                    disconnectOnline();
                    showScreen('start');
                    return;

                    showScreen('game');
                    resetGame();
                    showToast("對手已進入房間，遊戲開戰！");

                // 情況二：同步棋盤
                if (roomData.status === 'playing') {
                    boardState = roomData.boardState;
                    currentTurn = roomData.currentTurn;
                    
                    // 同步繪製畫面上所有的棋格

                    updateTurnIndicator();

                    // 檢查最新一步是否有勝負
                    const winIndicesO = checkWin(boardState, 'O');
                    const winIndicesX = checkWin(boardState, 'X');
                    
                    if (winIndicesO.length > 0) {
                        handleOnlineGameOver('O', winIndicesO);
                    } else if (winIndicesX.length > 0) {
                        handleOnlineGameOver('X', winIndicesX);
                    } else if (checkDraw(boardState)) {
                        handleOnlineGameOver('Draw');
                    }
                }

                // 情況三：重新開始同步
                if (roomData.lastAction === 'restart' && !gameActive) {
                    resetGame();
                    modalGameOver.classList.add('hidden');
                    showToast("對局已重新開始！");
                }
            }, (error) => {
                console.error("雲端聆聽異常:", error);
            });
        }

            try {
                document.execCommand('copy');
                showToast('房號已複製到您的剪貼簿！');
            } catch (err) {
                showToast('複製失敗，請手動複製。');
            }
            document.body.removeChild(tempTextarea);
        }

        // 重置
        btnReset.addEventListener('click', async () => {
            if (currentMode === MODES.PVP_ONLINE) {
                if (currentTurn !== myOnlineRole) {
                    showToast('目前輪到對手，請勿中途擅自重新開始');
                    playSound('error');
                    return;
                }
                
                const { doc, updateDoc } = window.dbUtils;
                const roomDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', activeRoomId);
                await updateDoc(roomDocRef, {
                    boardState: Array(25).fill(null),
                    currentTurn: 'O',
                    lastAction: 'restart'
                });
                showToast('您發起了重新開始，已同步對手');
            } else {
                resetGame();
                showToast('遊戲已重新開始');
            }
        });

        // 彈窗再戰一局
        btnModalNextGame.addEventListener('click', async () => {
            modalGameOver.classList.add('hidden');
            if (currentMode === MODES.PVP_ONLINE) {
                const { doc, updateDoc } = window.dbUtils;
                const roomDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', activeRoomId);
                await updateDoc(roomDocRef, {
                    boardState: Array(25).fill(null),
                    currentTurn: 'O',
                    lastAction: 'restart'
                });
            } else {
                resetGame();
            }
        });

        btnModalBackHome.addEventListener('click', () => {
            modalGameOver.classList.add('hidden');
            disconnectOnline();
            showScreen('start');
        });

        // 預設啟動
        resetGame();

    </script>
</body>
</html>
