<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極限 5x5 雲端即時井字棋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #030712; }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- 遊戲大廳區域 -->
    <div id="app" class="w-full max-w-md bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-2xl">
        <h1 class="text-2xl font-black text-center mb-6 text-blue-400">系統連線狀態</h1>
        
        <div id="statusIndicator" class="flex flex-col items-center justify-center py-10 space-y-4">
            <div id="spinner" class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
            <p id="statusText" class="text-gray-300 text-sm font-bold text-center">正在同步雲端資料庫...</p>
        </div>

        <div id="errorBox" class="hidden bg-red-900/20 border border-red-800 p-4 rounded-xl text-xs text-red-200 space-y-2">
            <p class="font-bold">⚠️ 連線異常：</p>
            <p id="errorMessage"></p>
            <button onclick="location.reload()" class="w-full mt-2 py-2 bg-red-600 rounded text-white font-bold">重新嘗試</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 你的金鑰
        const config = {
            apiKey: "AIzaSyB-uVcRZx7bSNgq7EOPHhfW1TjHufNKi5A",
            authDomain: "leokao-50c5b.firebaseapp.com",
            projectId: "leokao-50c5b",
            storageBucket: "leokao-50c5b.firebasestorage.app",
            messagingSenderId: "395528243921",
            appId: "1:395528243921:web:6d8940bc775a209274d3f0"
        };

        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');
        const errorBox = document.getElementById('errorBox');
        const errorMessage = document.getElementById('errorMessage');

        async function init() {
            try {
                // 1. 初始化
                const app = initializeApp(config);
                const auth = getAuth(app);
                
                // 2. 登入
                statusText.textContent = "正在進行身分認證...";
                await signInAnonymously(auth);
                
                // 3. 成功
                statusText.textContent = "連線成功！正在跳轉遊戲...";
                setTimeout(() => window.location.href = "index.html", 500); 
                
            } catch (err) {
                console.error(err);
                spinner.classList.add('hidden');
                errorBox.classList.remove('hidden');
                
                if (err.code === 'auth/operation-not-allowed') {
                    errorMessage.innerHTML = "請至 Firebase Console 後台：<br>1. 進入 Authentication 頁面<br>2. 點選「登入方法」<br>3. **啟用「匿名」登入**。";
                } else {
                    errorMessage.textContent = err.message;
                }
            }
        }

        init();
    </script>
</body>
</html>
