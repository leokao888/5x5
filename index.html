<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO NEXUS - 5x5 彩虹固定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap');
        body {
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
            background: #070b12;
            color: #f3f4f6;
            min-height: 100vh;
        }
        /* 電競流光彩虹字體 */
        .rainbow-text {
            background: linear-gradient(90deg, #ff0055, #00ffcc, #9900ff, #ff9900, #ff0055);
            background-size: 300% auto;
            animation: shine 6s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes shine {
            to { background-position: 300% center; }
        }
        /* O 棋子：青藍色發光 */
        .piece-O {
            color: #00f0ff;
            text-shadow: 0 0 12px rgba(0, 240, 255, 0.8);
        }
        /* X 棋子：極光粉發光 */
        .piece-X {
            color: #ff007f;
            text-shadow: 0 0 12px rgba(255, 0, 127, 0.8);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start p-4">

    <div class="w-full max-w-md bg-gray-900/90 border border-gray-800 p-6 rounded-2xl shadow-2xl mt-2 backdrop-blur-md">
        
        <div class="text-center mb-5">
            <h1 class="text-4xl font-black tracking-widest rainbow-text">NEO NEXUS</h1>
            <p class="text-[10px] text-gray-500 tracking-widest mt-1">5x5 GRID / 4-IN-A-ROW TO WIN</p>
        </div>

        <div class="bg-gray-950/80 border border-gray-800 p-4 rounded-xl mb-5 space-y-3">
            <div class="flex items-center justify-between gap-2">
                <div class="flex items-center space-x-2">
                    <span class="text-xs font-bold text-gray-400 uppercase">模式:</span>
                    <select id="mode-select" class="bg-gray-900 border border-gray-700 text-xs rounded px-2 py-1 text-cyan-400 font-bold focus:outline-none cursor-pointer">
                        <option value="PVE">個人模式 (vs 電腦)</option>
                        <option value="PVP_LOCAL">同屏雙人對戰</option>
                        <option value="PVP_ONLINE">雲端即時對戰</option>
                    </select>
                </div>
                <div id="status-badge" class="text-xs px-3 py-1 bg-gray-900 border border-gray-700 text-yellow-400 rounded-full font-bold">
                    未開始
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <button onclick="actions.start()" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-teal-500 hover:to-emerald-500 text-white font-bold py-2 rounded text-xs transition shadow-md shadow-emerald-950/30">
                    開始遊戲
                </button>
                <button onclick="actions.reset()" class="bg-gray-800 hover:bg-gray-700 text-gray-200 font-bold py-2 rounded text-xs transition border border-gray-700">
                    重新一局
                </button>
                <button onclick="actions.stop()" class="bg-gradient-to-r from-rose-700 to-red-700 hover:from-rose-600 hover:to-red-600 text-white font-bold py-2 rounded text-xs transition shadow-md shadow-rose-950/30">
                    結束/清空
                </button>
            </div>
        </div>

        <div id="online-panel" class="hidden bg-cyan-950/40 border border-cyan-800/60 p-3 rounded-xl mb-4 text-xs text-cyan-300 flex justify-between items-center">
            <div>房間 ID: <span id="room-id" class="font-mono text-white font-bold select-all">--</span></div>
            <div id="role-text" class="font-bold text-emerald-400">正在配對...</div>
        </div>

        <div class="w-full flex justify-center">
            <div id="board" class="grid grid-cols-5 gap-2 p-3 bg-gray-950 rounded-xl border border-gray-800 w-full aspect-square">
                </div>
        </div>

        <div id="info-msg" class="text-center text-xs text-gray-400 mt-4 h-4 font-medium tracking-wide">
            請選擇模式並點擊「開始遊戲」
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDocs, collection, query, where, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ================================================================
        // 🔑 【Firebase 金鑰填寫區】
        // 申請好專案後，請將 null 改成您的 config 物件，例如：
        // const firebaseConfig = { apiKey: "...", authDomain: "..." };
        // ================================================================
        const firebaseConfig = {
    apiKey: "AIzaSyAaFcenn1NPIH3XEzdd9xNnfyB6m3KYT0A",
    authDomain: "game-55-c674f.firebaseapp.com",
    databaseURL: "https://game-55-c674f-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "game-55-c674f",
    storageBucket: "game-55-c674f.firebasestorage.app",
    messagingSenderId: "486407212523",
    appId: "1:486407212523:web:817b9e9cbcd09602a81dae",
    measurementId: "G-6GC4C4EREE"
  };

        let db, auth;
        let isFirebaseReady = false;
        let gameActive = false;
        let currentMode = 'PVE'; 
        let boardState = Array(25).fill(''); 
        let turn = 'O'; 
        let myRole = ''; 
        let currentRoomId = null;
        let unsubscribeRoom = null;

        const boardEl = document.getElementById('board');
        const modeSelect = document.getElementById('mode-select');
        const statusBadge = document.getElementById('status-badge');
        const infoMsg = document.getElementById('info-msg');
        const onlinePanel = document.getElementById('online-panel');
        const roomIdEl = document.getElementById('room-id');
        const roleTextEl = document.getElementById('role-text');

        // 嘗試連結 Firebase
        if (firebaseConfig) {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                isFirebaseReady = true;
            } catch (e) {
                console.error("Firebase 初始化失敗:", e);
            }
        }

        // 建立 5x5 絕對固定比例的格子 UI
        function createBoardUI() {
            boardEl.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('button');
                // 使用 w-full 與 aspect-square 強制格子在任何狀態下形狀大小完全固定一致
                cell.className = 'w-full aspect-square bg-gray-900 border border-gray-800 rounded-xl flex items-center justify-center text-3xl font-black transition-all hover:bg-gray-850 disabled:cursor-not-allowed select-none p-0';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                boardEl.appendChild(cell);
            }
        }

        function renderBoard() {
            const cells = boardEl.querySelectorAll('button');
            cells.forEach((cell, idx) => {
                const val = boardState[idx];
                cell.textContent = val;
                cell.className = cell.className.replace(/piece-O|piece-X/g, '');
                if (val === 'O') cell.classList.add('piece-O');
                if (val === 'X') cell.classList.add('piece-X');
                cell.disabled = !gameActive || val !== '' || (currentMode === 'PVP_ONLINE' && turn !== myRole);
            });

            if (gameActive) {
                if (currentMode === 'PVP_ONLINE') {
                    statusBadge.textContent = turn === myRole ? "輪到你" : "等候中";
                    statusBadge.className = turn === myRole ? "text-xs px-3 py-1 bg-cyan-950 border border-cyan-500 text-cyan-400 rounded-full font-bold animate-pulse" : "text-xs px-3 py-1 bg-gray-800 text-gray-400 rounded-full font-bold";
                } else {
                    statusBadge.textContent = `輪到: ${turn}`;
                    statusBadge.className = turn === 'O' ? "text-xs px-3 py-1 bg-cyan-950 border border-cyan-700 text-cyan-400 rounded-full font-bold" : "text-xs px-3 py-1 bg-rose-950 border border-rose-700 text-rose-400 rounded-full font-bold";
                }
            }
        }

        function checkWin(board) {
            const size = 5, winCount = 4;
            const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const player = board[r * size + c];
                    if (!player) continue;
                    for (const [dr, dc] of directions) {
                        let count = 1;
                        for (let i = 1; i < winCount; i++) {
                            const nr = r + dr * i;
                            const nc = c + dc * i;
                            if (nr >= 0 && nr < size && nc >= 0 && nc < size && board[nr * size + nc] === player) count++;
                            else break;
                        }
                        if (count === winCount) return player;
                    }
                }
            }
            return board.includes('') ? null : 'TIE';
        }

        async function handleCellClick(idx) {
            if (!gameActive || boardState[idx] !== '') return;
            if (currentMode === 'PVP_ONLINE' && turn !== myRole) return;

            boardState[idx] = turn;
            
            if (currentMode === 'PVP_ONLINE') {
                const nextTurn = turn === 'O' ? 'X' : 'O';
                const winner = checkWin(boardState);
                await updateDoc(doc(db, "rooms", currentRoomId), {
                    board: boardState,
                    turn: nextTurn,
                    winner: winner || ''
                });
            } else {
                const winner = checkWin(boardState);
                if (winner) { endGame(winner); return; }
                
                turn = turn === 'O' ? 'X' : 'O';
                renderBoard();

                if (currentMode === 'PVE' && turn === 'X' && gameActive) {
                    infoMsg.textContent = "AI 正在思考最佳路徑...";
                    setTimeout(robotMove, 500);
                }
            }
        }

        function robotMove() {
            if (!gameActive) return;
            let available = [];
            boardState.forEach((val, idx) => { if (val === '') available.push(idx); });
            if (available.length === 0) return;

            for (let idx of available) {
                let test = [...boardState]; test[idx] = 'X';
                if (checkWin(test) === 'X') { executeRobotMove(idx); return; }
            }
            for (let idx of available) {
                let test = [...boardState]; test[idx] = 'O';
                if (checkWin(test) === 'O') { executeRobotMove(idx); return; }
            }
            const centerIndices = [12, 6, 8, 16, 18];
            const bestCenter = centerIndices.find(idx => available.includes(idx));
            if (bestCenter) { executeRobotMove(bestCenter); return; }

            const randomIdx = available[Math.floor(Math.random() * available.length)];
            executeRobotMove(randomIdx);
        }

        function executeRobotMove(idx) {
            boardState[idx] = 'X';
            const winner = checkWin(boardState);
            if (winner) {
                endGame(winner);
            } else {
                turn = 'O';
                infoMsg.textContent = "請落子...";
                renderBoard();
            }
        }

        function endGame(winner) {
            gameActive = false;
            renderBoard();
            if (winner === 'TIE') {
                statusBadge.textContent = "平手";
                statusBadge.className = "text-xs px-3 py-1 bg-gray-700 text-gray-200 rounded-full font-bold";
                infoMsg.textContent = "不分勝負，雙方實力旗鼓相當！";
            } else {
                statusBadge.textContent = `獲勝者: ${winner}`;
                statusBadge.className = winner === 'O' ? "text-xs px-3 py-1 bg-cyan-500 text-black rounded-full font-bold" : "text-xs px-3 py-1 bg-rose-500 text-white rounded-full font-bold";
                infoMsg.textContent = `玩家 ${winner} 達成 4 子連線成功！`;
            }
        }

        function cleanOnlineSession() {
            if (unsubscribeRoom) { unsubscribeRoom(); unsubscribeRoom = null; }
            currentRoomId = null;
            onlinePanel.classList.add('hidden');
        }

        async function setupOnlineGame() {
            if (!isFirebaseReady) {
                alert("請先在程式碼中的 firebaseConfig 填入您的 Firebase 連線金鑰！");
                cleanOnlineSession();
                modeSelect.disabled = false;
                statusBadge.textContent = "未開始";
                return;
            }
            infoMsg.textContent = "安全節點認證中...";
            try {
                await signInAnonymously(auth);
                infoMsg.textContent = "正在尋找開放配對房間...";
                
                const q = query(collection(db, "rooms"), where("status", "==", "waiting"), limit(1));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    const roomDoc = querySnapshot.docs[0];
                    currentRoomId = roomDoc.id;
                    myRole = 'X';
                    await updateDoc(doc(db, "rooms", currentRoomId), { status: "playing" });
                } else {
                    currentRoomId = "ROOM_" + Math.floor(Math.random() * 899999 + 100000);
                    myRole = 'O';
                    await setDoc(doc(db, "rooms", currentRoomId), {
                        board: Array(25).fill(''),
                        turn: 'O',
                        status: 'waiting',
                        winner: ''
                    });
                }

                roomIdEl.textContent = currentRoomId;
                roleTextEl.textContent = `你持旗: ${myRole}`;
                onlinePanel.classList.remove('hidden');

                unsubscribeRoom = onSnapshot(doc(db, "rooms", currentRoomId), (snapshot) => {
                    const data = snapshot.data();
                    if (!data) return;
                    boardState = data.board;
                    turn = data.turn;

                    if (data.status === 'waiting') {
                        gameActive = false;
                        statusBadge.textContent = "等待對手...";
                        infoMsg.textContent = "已建立大廳節點，等待第二位探測者加入...";
                    } else if (data.status === 'playing') {
                        if (data.winner) {
                            endGame(data.winner);
                            cleanOnlineSession();
                            modeSelect.disabled = false;
                        } else {
                            gameActive = true;
                            infoMsg.textContent = `對戰連線成功！您的身份是 [ ${myRole} ]`;
                        }
                    }
                    renderBoard();
                });
            } catch (err) {
                console.error(err);
                infoMsg.textContent = "雲端失敗: " + err.message;
            }
        }

        window.actions = {
            start: async () => {
                cleanOnlineSession();
                currentMode = modeSelect.value;
                boardState = Array(25).fill('');
                turn = 'O';
                modeSelect.disabled = true;
                
                if (currentMode === 'PVP_ONLINE') {
                    await setupOnlineGame();
                } else {
                    gameActive = true;
                    infoMsg.textContent = currentMode === 'PVE' ? "核心啟動！請下子 (O)" : "同屏雙人模式：由 O 先行落子";
                    renderBoard();
                }
            },
            reset: () => {
                if (currentMode === 'PVP_ONLINE') {
                    actions.start();
                } else {
                    boardState = Array(25).fill('');
                    turn = 'O';
                    gameActive = true;
                    infoMsg.textContent = "新局開始！由 O 先行落子";
                    renderBoard();
                }
            },
            stop: () => {
                cleanOnlineSession();
                gameActive = false;
                boardState = Array(25).fill('');
                modeSelect.disabled = false;
                statusBadge.textContent = "未開始";
                statusBadge.className = "text-xs px-3 py-1 bg-gray-900 text-yellow-400 rounded-full font-bold";
                infoMsg.textContent = "遊戲已重設，請重新選擇模式。";
                createBoardUI();
                renderBoard();
            }
        };

        // 頁面初始化
        createBoardUI();
        renderBoard();
    </script>
</body>
</html>
